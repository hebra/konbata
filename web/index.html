<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Konbata: A fast, privacy-focused, zero-dependency text-data converter for JSON, YAML, and XML."
    >
    <title>Konbata — Text-Data Converter</title>

    <link rel="icon" type="image/png" href="assets/konbata.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    >

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">

    <!-- Inline script to prevent FOUC -->
    <script>
      (function () {
        const storedTheme = localStorage.getItem("theme");
        const theme = storedTheme ||
          (globalThis.matchMedia &&
              globalThis.matchMedia("(prefers-color-scheme: dark)")
                .matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="header-top">
          <div class="header-brand">
            <img
              src="assets/konbata.png"
              alt=""
              class="logo"
              width="32"
              height="32"
            >
            <h1>Konbata — Text-Data Converter</h1>
          </div>
          <button
            id="theme-toggle"
            class="theme-toggle"
            aria-label="Toggle dark mode"
          >
            <svg
              class="sun-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg
              class="moon-icon"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </div>
        <div class="header-accent"></div>
      </header>

      <main>
        <section class="converter-section">
          <div class="editor-pane source-pane">
            <div class="pane-header">
              <label for="source-format" class="pane-label"
              >Source Format</label>
              <div class="controls">
                <select id="source-format">
                  <option value="json" selected>JSON</option>
                  <option value="yaml">YAML</option>
                  <option value="xml">XML</option>
                </select>
                <button
                  id="paste-btn"
                  class="icon-btn"
                  title="Paste from clipboard"
                  aria-label="Paste from clipboard"
                >
                  📋
                </button>
                <button
                  id="clear-btn"
                  class="icon-btn"
                  title="Clear source"
                  aria-label="Clear source"
                >
                  🗑️
                </button>
              </div>
            </div>
            <div class="textarea-wrapper">
              <textarea
                id="source-text"
                placeholder="Paste your data here..."
                spellcheck="false"
                autocomplete="off"
              ></textarea>
            </div>
          </div>

          <div class="editor-pane target-pane">
            <div class="pane-header">
              <label for="target-format" class="pane-label"
              >Target Format</label>
              <div class="controls">
                <select id="target-format">
                  <option value="json">JSON</option>
                  <option value="yaml" selected>YAML</option>
                  <option value="xml">XML</option>
                </select>
                <button
                  id="copy-btn"
                  class="icon-btn"
                  title="Copy to clipboard"
                  aria-label="Copy to clipboard"
                >
                  📄
                </button>
              </div>
            </div>
            <div class="textarea-wrapper">
              <textarea
                id="target-text"
                placeholder="Result will appear here..."
                readonly
                spellcheck="false"
                autocomplete="off"
              ></textarea>
            </div>
          </div>
        </section>

        <section
          id="error-display"
          class="error-display hidden"
          role="alert"
          aria-live="polite"
        >
          <p id="error-message"></p>
        </section>
      </main>

      <footer>
        <p>
          &copy; 2026 Konbata Project. All data processed locally for privacy.
          Optimised for developers.
        </p>
      </footer>
    </div>

    <div id="toast-container" aria-live="assertive"></div>

    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/theme.js"></script>
    <script type="module" src="js/converter.js"></script>
    <script type="module">
      import { initTheme } from "./js/theme.js";
      import { setupConverter } from "./js/converter.js";

      document.addEventListener("DOMContentLoaded", () => {
        initTheme();
        setupConverter();
      });
    </script>
  </body>
</html>
